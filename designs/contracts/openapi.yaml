openapi: "3.0.3"
info:
  title: "教育培训机构教务收费管理系统 API（EduFeeMS）"
  description: >
    教育培训机构教务收费管理系统（EduFeeMS）RESTful API 接口契约文档。
    涵盖认证、学员管理、课程管理、班级管理、收费管理、考勤管理六大业务域。
  version: "1.0.0"
  contact:
    name: "EduFeeMS 开发团队"
servers:
  - url: "http://localhost:8080/api"
    description: "本地开发环境"
  - url: "https://edu-fee-ms.example.com/api"
    description: "生产环境"

tags:
  - name: auth
    description: "认证接口 — 登录、登出、获取当前用户信息"
  - name: students
    description: "学员管理 — 学员CRUD、分班、转班、退学"
  - name: courses
    description: "课程管理 — 课程查询与新增"
  - name: classes
    description: "班级管理 — 班级创建、排课"
  - name: fees
    description: "收费管理 — 收费、退费、台账、欠费催缴"
  - name: attendances
    description: "考勤管理 — 签到、请假、考勤统计"

security:
  - bearerAuth: []

paths:

  # ==================== 认证接口 ====================
  /auth/login:
    post:
      tags:
        - auth
      summary: "用户登录"
      description: "使用用户名和密码登录，返回JWT Token"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              username: "admin"
              password: "Admin@123456"
      responses:
        "200":
          description: "登录成功，返回Token"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: "用户名或密码错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      tags:
        - auth
      summary: "用户登出"
      description: "使当前JWT Token失效"
      responses:
        "200":
          description: "登出成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      tags:
        - auth
      summary: "获取当前用户信息"
      description: "根据JWT Token获取当前登录用户的详细信息"
      responses:
        "200":
          description: "成功获取用户信息"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfoResponse"
        "401":
          description: "未登录或Token已过期"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ==================== 学员管理 ====================
  /students:
    get:
      tags:
        - students
      summary: "分页查询学员列表"
      description: "按条件分页查询学员，支持姓名、手机号、状态筛选"
      parameters:
        - name: pageNum
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: "页码"
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: "每页条数"
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: "学员姓名（模糊匹配）"
        - name: phone
          in: query
          required: false
          schema:
            type: string
          description: "手机号（模糊匹配，结果已脱敏）"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/StudentStatus"
          description: "学员状态"
      responses:
        "200":
          description: "分页查询成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentPageResponse"

    post:
      tags:
        - students
      summary: "新增学员"
      description: "录入新学员基本信息"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentCreateRequest"
            example:
              name: "张三"
              gender: "MALE"
              phone: "13800138000"
              birthday: "2012-05-15"
              parentName: "张父"
              parentPhone: "13900139000"
              address: "北京市朝阳区XX路XX号"
              source: "WALK_IN"
              remark: "有英语基础"
      responses:
        "200":
          description: "新增成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentResponse"
        "400":
          description: "参数校验失败"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /students/{id}:
    get:
      tags:
        - students
      summary: "获取学员详情"
      description: "根据ID获取学员详细信息，含班级信息和缴费记录摘要"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: "学员ID"
      responses:
        "200":
          description: "查询成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentDetailResponse"
        "404":
          description: "学员不存在"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      tags:
        - students
      summary: "修改学员信息"
      description: "更新学员基本信息（不含分班/转班操作）"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: "学员ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentUpdateRequest"
            example:
              name: "张三"
              phone: "13800138001"
              address: "北京市海淀区XX路XX号"
              remark: "已完成基础阶段"
      responses:
        "200":
          description: "修改成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentResponse"

  /students/{id}/enroll:
    post:
      tags:
        - students
      summary: "学员分班"
      description: "将学员分入指定班级，需校验班级容量与学员状态"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: "学员ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollRequest"
            example:
              classId: 1
              effectiveDate: "2026-07-01"
      responses:
        "200":
          description: "分班成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollResponse"
        "400":
          description: "班级已满员或学员状态异常"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /students/{id}/transfer:
    post:
      tags:
        - students
      summary: "学员转班"
      description: "将学员从当前班级转到目标班级"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: "学员ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferRequest"
            example:
              targetClassId: 2
              transferDate: "2026-07-15"
              reason: "课程时间冲突"
      responses:
        "200":
          description: "转班成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferResponse"

  /students/{id}/withdraw:
    post:
      tags:
        - students
      summary: "学员退学"
      description: "标记学员退学，需关联退费流程"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: "学员ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawRequest"
            example:
              withdrawDate: "2026-07-20"
              reason: "家庭搬迁"
              requireRefund: true
      responses:
        "200":
          description: "退学申请成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawResponse"

  # ==================== 课程管理 ====================
  /courses:
    get:
      tags:
        - courses
      summary: "分页查询课程列表"
      description: "按条件分页查询课程，支持类型、状态筛选"
      parameters:
        - name: pageNum
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 10
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CourseType"
          description: "课程类型"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CourseStatus"
          description: "课程状态"
        - name: keyword
          in: query
          required: false
          schema:
            type: string
          description: "课程名称关键词"
      responses:
        "200":
          description: "分页查询成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoursePageResponse"

    post:
      tags:
        - courses
      summary: "新增课程"
      description: "创建新课程，定义课程名称、类型、课时、定价"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseCreateRequest"
            example:
              name: "少儿英语启蒙班"
              type: "ENGLISH"
              totalHours: 48
              price: 4800.00
              description: "针对6-8岁儿童的英语启蒙课程，涵盖字母、单词、简单对话"
      responses:
        "200":
          description: "新增成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseResponse"

  # ==================== 班级管理 ====================
  /classes:
    get:
      tags:
        - classes
      summary: "分页查询班级列表"
      description: "按条件分页查询班级，支持课程、状态、时间范围筛选"
      parameters:
        - name: pageNum
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 10
        - name: courseId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: "关联课程ID"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClassStatus"
          description: "班级状态"
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: "开课起始日期"
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: "开课截止日期"
      responses:
        "200":
          description: "分页查询成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassPageResponse"

    post:
      tags:
        - classes
      summary: "创建班级"
      description: "基于课程创建新班级，设定容量、开课日期"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassCreateRequest"
            example:
              courseId: 1
              name: "少儿英语启蒙1班"
              capacity: 20
              startDate: "2026-09-01"
              endDate: "2027-01-15"
              teacherId: 3
              classroom: "301教室"
      responses:
        "200":
          description: "创建成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassResponse"

  /classes/{id}/schedules:
    post:
      tags:
        - classes
      summary: "排课"
      description: "为班级安排课程表，需检测时间冲突"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: "班级ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleCreateRequest"
            example:
              schedules:
                - dayOfWeek: 1
                  startTime: "09:00"
                  endTime: "10:30"
                  teacherId: 3
                  classroom: "301教室"
                - dayOfWeek: 3
                  startTime: "09:00"
                  endTime: "10:30"
                  teacherId: 3
                  classroom: "301教室"
      responses:
        "200":
          description: "排课成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleResponse"

  # ==================== 收费管理 ====================
  /fees/payment:
    post:
      tags:
        - fees
      summary: "学费收取"
      description: "为学员创建收费记录，支持全款/分期收取"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentCreateRequest"
            example:
              studentId: 1
              classId: 1
              amount: 4800.00
              paymentMethod: "WECHAT_PAY"
              installmentPlan: "FULL"
              remark: "全款缴纳"
      responses:
        "200":
          description: "收费成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "400":
          description: "金额异常或学员状态不符"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /fees/refund:
    post:
      tags:
        - fees
      summary: "退费处理"
      description: "处理学员退费，校验退费金额不得超过已收金额"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefundRequest"
            example:
              paymentId: 1
              amount: 2400.00
              refundMethod: "ORIGINAL"
              reason: "学员退学，按剩余课时比例退费"
      responses:
        "200":
          description: "退费成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefundResponse"

  /fees/records:
    get:
      tags:
        - fees
      summary: "收费台账查询"
      description: "查询收费台账明细，支持多维度筛选"
      parameters:
        - name: pageNum
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 10
        - name: studentId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: "学员ID"
        - name: classId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: "班级ID"
        - name: paymentStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaymentStatus"
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: keyword
          in: query
          required: false
          schema:
            type: string
          description: "流水号/学员姓名模糊搜索"
      responses:
        "200":
          description: "查询成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeRecordPageResponse"

  /fees/dunning:
    get:
      tags:
        - fees
      summary: "欠费查询"
      description: "查询欠费学员列表，支持按欠费金额区间筛选"
      parameters:
        - name: pageNum
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 10
        - name: classId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: minAmount
          in: query
          required: false
          schema:
            type: number
          description: "最低欠费金额"
        - name: maxAmount
          in: query
          required: false
          schema:
            type: number
          description: "最高欠费金额"
        - name: overdueDays
          in: query
          required: false
          schema:
            type: integer
          description: "逾期天数下限"
      responses:
        "200":
          description: "查询成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DunningPageResponse"

  # ==================== 考勤管理 ====================
  /attendances/checkin:
    post:
      tags:
        - attendances
      summary: "签到"
      description: "学员签到，记录签到时间、方式"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckinRequest"
            example:
              studentId: 1
              scheduleId: 1
              checkinType: "FACE"
              location: "301教室"
      responses:
        "200":
          description: "签到成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinResponse"

  /attendances/leave:
    post:
      tags:
        - attendances
      summary: "请假申请"
      description: "为学员提交请假申请"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveRequest"
            example:
              studentId: 1
              scheduleId: 1
              leaveType: "SICK"
              reason: "感冒发烧"
              startDate: "2026-09-05"
              endDate: "2026-09-05"
      responses:
        "200":
          description: "请假成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveResponse"

  /attendances/statistics:
    get:
      tags:
        - attendances
      summary: "考勤统计"
      description: "按班级/学员维度统计考勤数据，包含出勤率、缺勤次数、请假次数"
      parameters:
        - name: classId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: "班级ID"
        - name: studentId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: "学员ID"
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
          description: "统计起始日期"
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
          description: "统计截止日期"
      responses:
        "200":
          description: "统计成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceStatisticsResponse"

# ==================== Components ====================
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT认证，登录后获取Token，请求时携带 Authorization: Bearer <token>"

  schemas:

    # ---- 通用响应 ----
    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
          description: "状态码，200表示成功"
          example: 200
        message:
          type: string
          description: "提示信息"
          example: "操作成功"
        data:
          type: object
          nullable: true
          description: "响应数据"

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: "错误码"
          example: 401
        message:
          type: string
          description: "错误信息"
          example: "用户名或密码错误"
        data:
          type: object
          nullable: true
          example: null

    ValidationErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: "参数校验失败"
        data:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    PageInfo:
      type: object
      properties:
        pageNum:
          type: integer
          description: "当前页码"
        pageSize:
          type: integer
          description: "每页条数"
        total:
          type: integer
          format: int64
          description: "总记录数"
        pages:
          type: integer
          description: "总页数"

    # ---- 认证相关 ----
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: "用户名"
          minLength: 2
          maxLength: 50
          example: "admin"
        password:
          type: string
          description: "密码"
          format: password
          minLength: 6
          maxLength: 128
          example: "Admin@123456"

    LoginResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: "登录成功"
        data:
          type: object
          properties:
            token:
              type: string
              description: "JWT Token"
              example: "eyJhbGciOiJIUzI1NiIs..."
            tokenType:
              type: string
              example: "Bearer"
            expiresIn:
              type: integer
              description: "过期时间（秒）"
              example: 7200
            userInfo:
              $ref: "#/components/schemas/UserInfo"

    UserInfo:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: "admin"
        realName:
          type: string
          example: "系统管理员"
        role:
          type: string
          enum: ["ADMIN", "FINANCE", "ACADEMIC", "TEACHER"]
          example: "ADMIN"
        phone:
          type: string
          example: "138****8000"

